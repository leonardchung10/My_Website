<html>
    <head>
        <title>Contacts Page</title>
        <link rel="stylesheet" href="style.css">
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


    </head>
    <body class="contacts">
        <nav class="nav">
            <ul>
                <li><img src="img/profile.png"></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
        <div class="contacts">
            <form class="contacts">
                <div class="form-group">
                    <label for="fname">Name (*)</label>
                    <input type="text" id="fname" name="firstname" placeholder="e.g. John" class="contacts">
                    <label for="lname">Last Name (*)</label>
                    <input type="text" id="lname" name="lastname" placeholder="e.g. Cena" class="contacts">
                </div>
                <div class="form-group">
                    <label for="relation">Your Relation to Me (*)</label>
                    <select id="relation" name="relation" class="contacts" onchange="toggleOther()">
                        <option value="select">Please select...</option>
                        <option value="acquaintance">Acquaintance</option>
                        <option value="teacher">Teacher</option>
                        <option value="recruiter">Recruiter</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group" id="other-group">
                    <label for="other">Please specfiy (*) </label>
                    <input type="text" id="other" name="other" placeholder="e.g. Neighbour" class="contacts">
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <textarea id="subject" name="subject" placeholder="Type your message here" class="contacts"></textarea>
                </div>
                <div class="form-group">
                    <input type="submit" value="Submit" class="contacts" id="submit">
                </div>
            </form>
        </div>
        <script src="script.js" type="text/javascript">

        </script>
    
    </body>
</html>
