    <body class="contacts">
        <div class="nav reveal">
            <nav class="nav">
                <ul>

        </div>

        <div id="form-message"></div>

        <div class="contacts" style="background-color: cornflowerblue; width: auto;">
            <div class="social-button reveal">
                <span class="mySubtext" style="font-size: 40px;">FIND ME HERE: </span>
                <a href="https://www.linkedin.com/in/leonard-chung-b75211281/">
                    <img src="svg/linkedin.svg" id="linkedin">
                </a>
            </div>
        </div>

        <div class="contacts">
            <form class="contacts reveal" id="contact-form">
                <div class="form-group">
                    <label for="name">Name (*)</label>
                    <input type="text" id="name" name="name" placeholder="e.g. John Cena" class="contacts" required>
                    <label for="email">Email (*)</label>
                    <input type="email" id="email" name="email" placeholder="e.g. youremail@gmail.com" class="contacts" required>
                    <label for="relation">Your Relation to Me (*)</label>
                    <input type="text" id="relation" name="relation" placeholder="e.g. Neighbour" class="contacts" required>
                    <label for="title">Title (*)</label>
                    <input type="text" id="title" name="title" placeholder="e.g. Help Required" class="contacts" required>
                </div>
                
                
                <!-- <div class="form-group">
                    <label for="relation">Your Relation to Me (*)</label>
                    <select id="relation" name="relation" class="contacts" onchange="toggleOther()">
                        <option value="select">Please select...</option>
                        <option value="acquaintance">Acquaintance</option>
                        <option value="teacher">Teacher</option>
                        <option value="recruiter">Recruiter</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group" id="other-group">
                    <label for="other">Please specfiy (*) </label>
                    <input type="text" id="other" name="other" placeholder="e.g. Neighbour" class="contacts">
                </div> -->


                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type your message here" class="contacts" required></textarea>
                </div>
                <div class="form-group">
                    <input type="submit" value="Submit" class="contacts" id="submit">
                </div>
            </form>
        </div>






    <!-- Load EmailJS library FIRST -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <!-- THEN run your code -->
    <script>
        // Initialize EmailJS
        emailjs.init('uXyZhNnvUaSvQ4c8U');

        // Handle form submission
        const form = document.getElementById('contact-form');
        const formMessage = document.getElementById('form-message');

        form.addEventListener('submit', function(event) {
        event.preventDefault();
        
        console.log('Form submitted!');
        
        // Show loading state
        formMessage.innerHTML = '<div id="form-message" class="alert alert-info">Sending...</div>';

        emailjs.sendForm('service_dh5wrfy', 'template_xdr862b', this)
            .then(function(response) {
            console.log('SUCCESS!', response.status, response.text);
            formMessage.innerHTML = '<div class="alert alert-success">Message sent successfully!</div>';
            form.reset();
            }, function(error) {
            console.log('FAILED...', error);
            formMessage.innerHTML = '<div class="alert alert-danger">Failed to send message. Please try again.</div>';
            });
        });
        </script>

        <script src="script.js" type="text/javascript">

        </script>
    
    </body>
